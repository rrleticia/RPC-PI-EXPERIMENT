created_at_utc: '2026-06-29T11:48:46.510794+00:00'
project_root: /workspace/pi-defense-exp
base_model:
  base_model_id: Qwen/Qwen2.5-1.5B-Instruct
  model_family: causal_lm
  uses_chat_template: true
  reason_for_choice: Modelo instrucional relativamente pequeno, mais viável para uma
    GPU no RunPod e adequado para avaliação inicial de prompts e adaptadores.
  same_base_model_for_all_scenarios: true
seeds:
  dataset_seed: 42
  experiment_seeds:
  - 42
  - 123
  - 2026
  trained_scenario_ids: &id001
  - c2_struq_sft
  - c3_secalign_dpo
  - c4_ih_sft
  trained_scenario_labels:
  - C2
  - C3
  - C4
  replicates_per_trained_scenario: 3
  total_adapter_runs: 9
  notes:
  - DATASET_SEED controls dataset construction and must stay fixed across scenarios.
  - EXPERIMENT_SEEDS define training replicates for c2_struq_sft, c3_secalign_dpo,
    and c4_ih_sft.
  - C0 and C1 do not train adapters.
  - Scenario IDs are kept aligned with 04_run_training.ipynb.
scenarios:
  c2_struq_sft:
    scenario_id: c2_struq_sft
    scenario_label: C2
    name: StruQ-like SFT
    method: sft
    train_file: /workspace/pi-defense-exp/data/views/struq/train_sft.jsonl
    validation_file: /workspace/pi-defense-exp/data/views/struq/validation_sft.jsonl
    adapter_output_base: /workspace/pi-defense-exp/adapters/struq
    adapter_outputs_by_seed:
      seed_42: /workspace/pi-defense-exp/adapters/struq/seed_42
      seed_123: /workspace/pi-defense-exp/adapters/struq/seed_123
      seed_2026: /workspace/pi-defense-exp/adapters/struq/seed_2026
  c3_secalign_dpo:
    scenario_id: c3_secalign_dpo
    scenario_label: C3
    name: SecAlign-like DPO
    method: dpo
    train_file: /workspace/pi-defense-exp/data/views/secalign/train_dpo.jsonl
    validation_file: /workspace/pi-defense-exp/data/views/secalign/validation_dpo.jsonl
    adapter_output_base: /workspace/pi-defense-exp/adapters/secalign
    adapter_outputs_by_seed:
      seed_42: /workspace/pi-defense-exp/adapters/secalign/seed_42
      seed_123: /workspace/pi-defense-exp/adapters/secalign/seed_123
      seed_2026: /workspace/pi-defense-exp/adapters/secalign/seed_2026
  c4_ih_sft:
    scenario_id: c4_ih_sft
    scenario_label: C4
    name: Instruction-Hierarchy-like SFT
    method: sft
    train_file: /workspace/pi-defense-exp/data/views/ih/train_sft.jsonl
    validation_file: /workspace/pi-defense-exp/data/views/ih/validation_sft.jsonl
    adapter_output_base: /workspace/pi-defense-exp/adapters/ih
    adapter_outputs_by_seed:
      seed_42: /workspace/pi-defense-exp/adapters/ih/seed_42
      seed_123: /workspace/pi-defense-exp/adapters/ih/seed_123
      seed_2026: /workspace/pi-defense-exp/adapters/ih/seed_2026
