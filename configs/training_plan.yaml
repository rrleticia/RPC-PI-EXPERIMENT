lora_config:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
sft_training_config:
  num_train_epochs: 1
  learning_rate: 0.0002
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 1024
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  fp16: false
  bf16: true
dpo_training_config:
  num_train_epochs: 1
  learning_rate: 5.0e-05
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  max_prompt_length: 1024
  max_length: 1280
  beta: 0.1
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  fp16: false
  bf16: true
evaluation_files:
  test_clean: /workspace/pi-defense-exp/data/views/evaluation/test_clean.jsonl
  test_attacked_seen: /workspace/pi-defense-exp/data/views/evaluation/test_attacked_seen.jsonl
  test_attacked_unseen: /workspace/pi-defense-exp/data/views/evaluation/test_attacked_unseen.jsonl
notes:
- C0 and C1 do not require training.
- C2 and C4 use SFT with clean + attacked_seen examples.
- C3 uses DPO with attacked_seen examples only.
- All scenarios must use the same base model.
- All scenarios must be evaluated on the same test files.
- c2_struq_sft, c3_secalign_dpo, and c4_ih_sft must each be trained once for each
  seed in EXPERIMENT_SEEDS.
- Each trained adapter must be saved under adapters/<defense_family>/seed_<seed>/.
- Training runs must write incremental logs under logs/training/ and logs/training/runs/<scenario_id>/seed_<seed>/.
- The scenario_id values are aligned with 04_run_training.ipynb.
